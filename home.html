<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Receive Crypto</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.card{
    background:#1b1b1b;
    border-radius:15px;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
    max-width:600px;
    margin:auto;
}

.logo{
    width:45px;
    height:45px;
}

.dropdown{
    position:relative;
}

.coinButton{
    background:none;
    border:none;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    white-space:nowrap;
}

.menu{
    display:none;
    position:absolute;
    top:35px;
    left:0;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    width:180px;
    z-index:10;
}

.menu div{
    padding:12px;
    cursor:pointer;
}

.menu div:hover{
    background:#333;
}

.dropdown:hover .menu{
    display:block;
}

.address{
    flex:1;
    background:#292929;
    padding:10px;
    border-radius:8px;
    color:#00d084;
    font-size:14px;
    word-break:break-all;
}
</style>

</head>

<body>

<div class="card">

<img id="coinLogo" class="logo"
src="https://cryptologos.cc/logos/bitcoin-btc-logo.png?v=040">


<div class="dropdown">

<button class="coinButton" id="coinName">
Bitcoin ▼
</button>

<div class="menu">

<div onclick="changeCoin('btc')">
Bitcoin
</div>

<div onclick="changeCoin('eth')">
Ethereum
</div>

<div onclick="changeCoin('bnb')">
BNB Smart Chain
</div>

</div>

</div>


<div class="address" id="walletAddress">
</div>


</div>


<script>

const addresses = JSON.parse(
localStorage.getItem("wallet_addresses")
);


const coins={

btc:{
name:"Bitcoin",
logo:"https://cryptologos.cc/logos/bitcoin-btc-logo.png?v=040",
address:addresses.btc
},

eth:{
name:"Ethereum",
logo:"https://cryptologos.cc/logos/ethereum-eth-logo.png?v=040",
address:addresses.eth
},

bnb:{
name:"BNB Smart Chain",
logo:"https://cryptologos.cc/logos/bnb-bnb-logo.png?v=040",
address:addresses.bnb
}

};


function changeCoin(type){

document.getElementById("coinLogo").src =
coins[type].logo;

document.getElementById("coinName").innerHTML =
coins[type].name + " ▼";

document.getElementById("walletAddress").textContent =
coins[type].address;

}

// Default selection
changeCoin("btc");

</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  .phone {
    width: 390px;
    max-width: 100%;
    background: #16191e;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    color: #ffffff;
    padding-bottom: 24px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 16px 8px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #4f9bff;
    background: none;
    border: none;
    font-size: 16px;
    cursor: pointer;
  }

  .header h1 {
    font-size: 17px;
    font-weight: 600;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .header-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
  }

  .info-btn {
    color: #8b93a1;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
  }

  /* QR Card */
  .qr-card {
    background: #ffffff;
    margin: 20px 24px 4px;
    border-radius: 20px;
    padding: 24px 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #qrcode {
    width: 220px;
    height: 220px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #qrcode img {
    border-radius: 8px;
  }

  .qr-shield {
    position: absolute;
    width: 44px;
    height: 44px;
    background: #ffffff;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .address-text {
    margin-top: 16px;
    color: #1a1a1a;
    font-size: 14px;
    text-align: center;
    font-weight: 600;
    letter-spacing: 0.2px;
    word-break: break-all;
    line-height: 1.5;
    font-family: "SF Mono", "Courier New", monospace;
  }

  .warning-text {
    text-align: center;
    color: #8b93a1;
    font-size: 13px;
    line-height: 1.6;
    padding: 16px 32px 4px;
  }

  .warning-text b {
    color: #d8dde3;
  }

  /* Action buttons */
  .actions {
    display: flex;
    justify-content: center;
    gap: 48px;
    padding: 24px 16px 8px;
  }

  .action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    cursor: pointer;
    color: #c4cad3;
    font-size: 13px;
  }

  .action .circle {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #262b33;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #4f9bff;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .action:active .circle {
    background: #2f3540;
    transform: scale(0.95);
  }

  .action.copied .circle {
    background: #1f7a4d;
    color: #ffffff;
  }

  /* Deposit banner */
  .deposit-banner {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #1e2229;
    margin: 20px 16px 0;
    padding: 16px;
    border-radius: 16px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .deposit-banner:active {
    background: #262b33;
  }

  .deposit-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #12b76a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .deposit-text h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .deposit-text p {
    font-size: 13px;
    color: #8b93a1;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2f3540;
    color: #fff;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>

<div class="phone">
  <div class="header-wrap">
    <button class="back-btn" onclick="history.back()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9.5" stroke="#8b93a1" stroke-width="1.5"/><path d="M12 11v5" stroke="#8b93a1" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="8" r="1" fill="#8b93a1"/></svg>
    </button>
  </div>

  <div class="qr-card">
    <div id="qrcode"></div>
    <div class="address-text" id="addressText">0xc910623332f6c7fB943A2B6c6dc89B3559d21FcB</div>
  </div>

  <p class="warning-text">
    Send only <b>BNB Smart Chain (BNB)</b> to this address. Sending any other coins may result in permanent loss.
  </p>

  <div class="actions">
    <button class="action" id="copyBtn" onclick="copyAddress()">
      <span class="circle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="8" y="8" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2" stroke="currentColor" stroke-width="1.8"/></svg>
      </span>
      Copy
    </button>
    <button class="action" onclick="setAmount()">
      <span class="circle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 12l-7.5 7.5a2 2 0 0 1-2.83 0L4 13.83V4h9.83l6.17 6.17a2 2 0 0 1 0 2.83z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="8.5" cy="8.5" r="1.2" fill="currentColor"/></svg>
      </span>
      Set Amount
    </button>
    <button class="action" onclick="shareAddress()">
      <span class="circle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 16V4M12 4L8 8M12 4l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </span>
      Share
    </button>
  </div>

  <div class="deposit-banner" onclick="showToast('Opening exchange deposit...')">
    <div class="deposit-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="20" height="14" rx="2" stroke="#0b0e11" stroke-width="1.8"/><path d="M2 10h20" stroke="#0b0e11" stroke-width="1.8"/></svg>
    </div>
    <div class="deposit-text">
      <h3>Deposit from exchange</h3>
      <p>By direct transfer from your account</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const address = "0xc910623332f6c7fB943A2B6c6dc89B3559d21FcB";

  // Generate QR code
  new QRCode(document.getElementById("qrcode"), {
    text: address,
    width: 220,
    height: 220,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });

  // Add shield icon overlay in the center once QR renders
  setTimeout(() => {
    const shield = document.createElement("div");
    shield.className = "qr-shield";
    shield.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5l-8-3z" stroke="#0b0e11" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
    document.getElementById("qrcode").appendChild(shield);
  }, 100);

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
  }

  function copyAddress() {
    navigator.clipboard.writeText(address).then(() => {
      showToast("Address copied to clipboard");
      const btn = document.getElementById("copyBtn");
      btn.classList.add("copied");
      setTimeout(() => btn.classList.remove("copied"), 1200);
    }).catch(() => {
      showToast("Unable to copy — copy manually");
    });
  }

  function setAmount() {
    const amt = prompt("Enter amount to request (BNB):");
    if (amt) showToast(`Amount set: ${amt} BNB`);
  }

  function shareAddress() {
    if (navigator.share) {
      navigator.share({ title: "My BNB Address", text: address });
    } else {
      showToast("Sharing not supported on this browser");
    }
  }
</script>

</body>
</html>
