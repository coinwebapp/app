<style>
   /*======================================
DASHBOARD LAYOUT
======================================*/

.dashboard{
    min-height:100vh;
    display:block;
    background:#f8fafc;
}

.dashboard-main{
    width:100%;
    padding-bottom:90px; /* space for bottom nav */
}
/*======================================
HEADER
======================================*/

.dashboard-header{

    background:#fff;

    padding:1.5rem 2rem;

    border-bottom:1px solid #ececec;

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:2rem;

    flex-wrap:wrap;
    
    border-bottom-right-radius: 20px;
    
    border-bottom-left-radius: 20px;

}

.breadcrumb{

    color:#6b7280;

    font-size:.9rem;

    margin-bottom:.5rem;

}

.dashboard-header h1{

    font-size:2rem;

    font-weight:800;

}

.header-user{

    display:flex;

    align-items:center;

    gap:1rem;

}

.notify-btn{

    width:40px;

    height:40px;

    border-radius:50%;

    background:#fff4ec;

    color:var(--primary);

}

.user-box{

    display:flex;

    align-items:center;

    gap:.75rem;

}

.user-box img{

    width:44px;

    height:44px;

    border-radius:50%;

    object-fit:cover;

}

.user-box span{

    font-weight:600;

}

/*======================================
CONTENT AREA
======================================*/

.escrow-form-section{

    padding:2rem;

}

/*======================================
CREATE ESCROW FORM
======================================*/

.escrow-form{

    width:100%;

}

.form-grid{

    display:grid;

    grid-template-columns:1fr;

    gap:2rem;

}

.form-column{

    display:flex;

    flex-direction:column;

    gap:1.25rem;

    min-width:0;

}

/*======================================
FORM GROUP
======================================*/

.form-group{

    display:flex;

    flex-direction:column;

    gap:.55rem;

}

.form-group label{

    font-size:.92rem;

    font-weight:600;

    color:#374151;

}

/*======================================
INPUTS
======================================*/

.form-group input,
.form-group select,
.form-group textarea{

    width:100%;

    min-height:54px;

    padding:0 1rem;

    border:1px solid #dcdfe4;

    border-radius:14px;

    background:#fff;

    outline:none;

    font-size:.96rem;

    transition:.25s;

    font-family:inherit;

}

.form-group textarea{

    resize:vertical;

    min-height:180px;

    padding:1rem;

}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{

    border-color:var(--primary);

    box-shadow:0 0 0 4px rgba(255,123,0,.12);

}

/*======================================
PLACEHOLDER
======================================*/

::placeholder{

    color:#9ca3af;

}

/*======================================
WALLET NOTICE
======================================*/

.wallet-info{

    display:flex;

    align-items:flex-start;

    gap:1rem;

    background:#eef6ff;

    border:1px solid #cfe4ff;

    padding:1rem;

    border-radius:16px;

}

.wallet-info i{

    color:#2563eb;

    margin-top:3px;

    font-size:1.1rem;

}

.wallet-info p{

    color:#374151;

    font-size:.95rem;

    line-height:1.5;

}

/*======================================
SUBMIT BUTTON
======================================*/

.submit-btn{

    width:100%;

    min-height:56px;

    margin-top:.5rem;

    border-radius:16px;

    background:linear-gradient(
        135deg,
        #ff9a31,
        #ff6200);

    color:#fff;

    font-size:1rem;

    font-weight:700;

    transition:.3s;

}

.submit-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 18px 35px rgba(255,98,0,.25);

}

/*======================================
TABLETS
======================================*/

@media (min-width:768px){

.form-grid{

    grid-template-columns:1fr;

}

}

/*======================================
LAPTOPS
======================================*/

@media (min-width:1024px){

.form-grid{

    grid-template-columns:repeat(2,minmax(0,1fr));

    gap:2.5rem;

}

}

/*======================================
LARGE DESKTOP
======================================*/

@media (min-width:1440px){

.escrow-form-section{

    padding:2.5rem 3rem;

}

.form-grid{

    gap:3rem;

}

}

/*======================================
RESPONSIVE SIDEBAR
Mobile First
======================================*/

/* Hide mobile button on desktop */

.sidebar-toggle{

    display:none;

}

/*=============================
TABLETS
=============================*/

@media (max-width:991px){

.dashboard{

    grid-template-columns:1fr;

}

/*--------------------
Sidebar
--------------------*/

.sidebar{

    position:fixed;

    top:0;

    left:-100%;

    width:280px;

    max-width:85vw;

    height:100vh;

    background:#fff;

    z-index:1200;

    transition:left .35s ease;

    box-shadow:0 20px 60px rgba(0,0,0,.18);

    overflow-y:auto;

}

.sidebar.show{

    left:0;

}

/*--------------------
Content
--------------------*/

.dashboard-main{

    width:100%;

    min-width:0;

}

/*--------------------
Header
--------------------*/

.dashboard-header{

    padding:1rem;

}

.dashboard-header h1{

    font-size:1.6rem;

}

/*--------------------
User
--------------------*/

.user-box span{

    display:none;

}

/*--------------------
Toggle Button
--------------------*/

.sidebar-toggle{

    display:flex;

    align-items:center;

    justify-content:center;

    width:46px;

    height:46px;

    border:none;

    border-radius:12px;

    background:#fff4ec;

    color:var(--primary);

    font-size:1.1rem;

}

/*--------------------
Overlay
--------------------*/

.sidebar-overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.45);

    opacity:0;

    visibility:hidden;

    transition:.3s;

    z-index:1100;

}

.sidebar-overlay.show{

    opacity:1;

    visibility:visible;

}

}

/*=============================
SMALL PHONES
=============================*/

@media (max-width:600px){

.dashboard-header{

    gap:1rem;

}

.dashboard-header h1{

    font-size:1.35rem;

}

.breadcrumb{

    font-size:.8rem;

}

.escrow-form-section{

    padding:1rem;

}

.logo-box{

    width:42px;

    height:42px;

}

.sidebar{

    width:260px;

}

.form-group input,

.form-group select,

.form-group textarea{

    font-size:16px;

}

/* Prevents iPhone zoom */

.submit-btn{

    min-height:54px;

}

}

/*=============================
EXTRA SMALL DEVICES
=============================*/

@media (max-width:360px){

.dashboard-header{

    padding:.8rem;

}

.user-box img{

    width:38px;

    height:38px;

}

.notify-btn{

    width:40px;

    height:40px;

}

.sidebar{

    width:240px;

}

}

/*=============================
LARGE SCREENS
=============================*/

@media (min-width:1600px){

.dashboard{

    grid-template-columns:300px 1fr;

}

.dashboard-header{

    padding:2rem 3rem;

}

.escrow-form-section{

    padding:3rem;

}

}

/*======================================
GLOBAL RESPONSIVE FIXES
======================================*/

*{

    min-width:0;

}

.dashboard,

.dashboard-main,

.form-grid,

.form-column{

    min-width:0;

}

input,

select,

textarea,

button{

    max-width:100%;

}

img{

    max-width:100%;

    height:auto;

}

table{

    width:100%;

    display:block;

    overflow-x:auto;

}

body{

    overflow-x:hidden;

}


/*======================================
HEADER LEFT
======================================*/

.header-left{

    display:flex;

    align-items:center;

    gap:1rem;

}

/*======================================
DESKTOP
======================================*/

@media (min-width:992px){

.sidebar-toggle{

display:none;

}

.sidebar-overlay{

display:none;

}

}

/*======================================
MOBILE
======================================*/

@media (max-width:991px){

.header-left{

flex:1;

}

}

/* ===============================
MODERN FLOATING BOTTOM NAV
=============================== */

.dashboard-main{
    padding-bottom:110px;
}

.bottom-nav{

    position:fixed;

    left:50%;

    transform:translateX(-50%);

    bottom:18px;

    width:calc(100% - 28px);

    max-width:560px;

    height:74px;

    background:rgba(255,255,255,.88);

    backdrop-filter:blur(24px);

    -webkit-backdrop-filter:blur(24px);

    border:1px solid rgba(255,255,255,.5);

    border-radius:26px;

    display:flex;

    justify-content:space-around;

    align-items:center;

    box-shadow:
    0 10px 35px rgba(0,0,0,.08),
    0 2px 10px rgba(0,0,0,.05);

    z-index:5000;

    padding:0 8px;

    padding-bottom:env(safe-area-inset-bottom);
}

.bottom-nav a{

    flex:1;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    text-decoration:none;

    color:#9ca3af;

    transition:.35s;

    gap:5px;

    font-size:11px;

    font-weight:600;

}

.nav-icon{

    width:44px;

    height:44px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    transition:.35s;

}

.nav-icon i{

    font-size:20px;

}

.bottom-nav a:hover{

    color:#ff7b00;

}

.bottom-nav a:hover .nav-icon{

    transform:translateY(-2px);

}

.bottom-nav a.active{

    color:#ff7b00;

}

.bottom-nav a.active .nav-icon{

    background:linear-gradient(
        135deg,
        #ff9d2f,
        #ff6200);

    color:#fff;

    box-shadow:
    0 10px 24px rgba(255,98,0,.35);

    transform:translateY(-12px) scale(1.05);

}

.bottom-nav a.active span{

    margin-top:-6px;

}

.bottom-nav a:active{

    transform:scale(.95);

}

/* Small notification badge */

.nav-badge{

    position:absolute;

    top:8px;

    right:16px;

    width:9px;

    height:9px;

    background:#ff3b30;

    border-radius:50%;

    border:2px solid white;

}

/* Desktop */

@media(min-width:992px){

.bottom-nav{

    max-width:620px;

}

}

/* Small phones */

@media(max-width:420px){

.bottom-nav{

    width:calc(100% - 18px);

    height:70px;

    border-radius:22px;

}

.nav-icon{

    width:40px;

    height:40px;

}

.nav-icon i{

    font-size:18px;

}

.bottom-nav span{

    font-size:10px;

}

}

a {
    cursor: none;
}
</style>
